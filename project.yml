name: Coins
configs:
  Debug: debug
  Release: release
options:
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_VERSION: "5.10"
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
targets:
  Coins:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Coins
    settings:
      base:
        ENABLE_TESTABILITY: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.odile.coins
        PRODUCT_NAME: Coins
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Coins/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - CoinsTests
  CoinsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoinsTests
    dependencies:
      - target: Coins
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Coins.app/Coins"
        PRODUCT_NAME: CoinsTests
        PRODUCT_BUNDLE_IDENTIFIER: com.odile.coins.tests
        GENERATE_INFOPLIST_FILE: YES
